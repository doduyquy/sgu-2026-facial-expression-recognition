_base_: "base.yaml"

model:
  name: "cnn_dictionary"
  attention_type: "cbam"      # Attention trong ResNet35 backbone
  embed_dim: 1024             # Dimension của visual/region tokens
  num_heads: 4                # Số heads trong Cross-Attention
  num_regions: 6              # Số vùng khuôn mặt (forehead, left_eye, right_eye, nose, mouth, chin)

  # ── Transfer Learning ──
  pretrained_backbone_path: "/kaggle/input/datasets/lhngphc/resnet35-cbam/resnet35_15042026_0221_best.pth"
  freeze_backbone_epochs: 999  # KHÔNG unfreeze backbone — Phase 2 làm val_loss tệ hơn do fine-tune phá features

data:
  image_size: 48
  channels: 1
  batch_size: 64

training:
  lr: 0.001                   # LR cho Phase 1 (freeze backbone, train head)
  finetune_lr: 0.00005        # LR backbone khi unfreeze (low, chỉ tinh chỉnh nhẹ)
  head_lr: 0.0002             # LR head khi unfreeze (giảm để bớt dao động val)
  epochs: 100
  optimizer: "adamw"
  weight_decay: 0.05          # Tăng mạnh để chống head overfit (backbone frozen, head cần regularize)
  label_smoothing: 0.15        # Tăng nhẹ để chống memorize noise của FER2013
  scheduler: "reduce_lr_on_plateau"
  lr_patience: 5               # Head hội tụ nhanh hơn khi backbone frozen
  lr_factor: 0.5
  use_class_weights: true

# ── WandB run identity ──
# Đặt tên run ở đây → tự động link lên WandB với tên này + timestamp
# Để trống (null) thì dùng tên mặc định: {model_name}_{timestamp}
logging:
  wandb_run_name: "cnn_dict_v2_frozen_backbone"   # <-- ĐỔI TÊN Ở ĐÂY
  
