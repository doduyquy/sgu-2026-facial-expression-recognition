_base_: "base.yaml"

model:
  name: "cnn_dictionary"
  attention_type: "cbam"      # Attention trong ResNet35 backbone
  embed_dim: 1024             # Dimension của visual/region tokens
  num_heads: 4                # Số heads trong Cross-Attention
  num_regions: 6              # Số vùng khuôn mặt (forehead, left_eye, right_eye, nose, mouth, chin)

  # ── Transfer Learning ──
  pretrained_backbone_path: "/kaggle/input/datasets/nadkli2704/resnet35-cbam/resnet35_15042026_0221_best.pth"
  freeze_backbone_epochs: 12   # Freeze giai đoạn đầu, sau đó unfreeze để backbone thích nghi FER

data:
  image_size: 48
  channels: 1
  batch_size: 64

training:
  lr: 0.001                   # LR cho Phase 1 (freeze backbone, train head)
  # ── Phase 2: Unfreeze fine-tuning ──
  finetune_lr: 0.00005        # Slightly higher than 1e-5 for AdamW (no SAM overhead)
  head_lr: 0.0003             # Higher head LR for faster adaptation
  # ── Metrics & Persistence ──
  monitor_metric: "val_accuracy"   # Use accuracy for BEST checkpoint
  monitor_mode: "max"
  early_stop_metric: "val_loss"    # Use loss for EARLY STOPPING
  early_stop_mode: "min"
  patience: 20
  
  epochs: 100
  optimizer: "adamw"          # Back to AdamW — proven to outperform SAM on this task
  weight_decay: 0.001         # Light regularization (original best setting)
  label_smoothing: 0.05       # Moderate smoothing for noisy labels
  scheduler: "reduce_lr_on_plateau"
  lr_patience: 7
  lr_factor: 0.5              # Standard decay
  use_class_weights: true

# ── WandB run identity ──
logging:
  wandb_run_name: "cnn_dict_v3_AdamW_SpatialMask"
  
