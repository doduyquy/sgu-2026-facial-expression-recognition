_base_: "base.yaml"

model:
  name: "cnn_dictionary"
  attention_type: "cbam"      # Attention trong ResNet35 backbone
  embed_dim: 1024             # Dimension của visual/region tokens
  num_heads: 4                # Số heads trong Cross-Attention
  num_regions: 6              # Số vùng khuôn mặt (forehead, left_eye, right_eye, nose, mouth, chin)

  # ── Transfer Learning ──
  pretrained_backbone_path: "/kaggle/input/datasets/nadkli2704/resnet35-cbam/resnet35_15042026_0221_best.pth"
  freeze_backbone_epochs: 12   # Freeze giai đoạn đầu, sau đó unfreeze để backbone thích nghi FER

data:
  image_size: 48
  channels: 1
  batch_size: 64

training:
  lr: 0.001                   # LR cho Phase 1 (freeze backbone, train head)
  # ── Phase 2: Unfreeze fine-tuning ──
  finetune_lr: 0.00001        # Lowered to 1e-5 to preserve robust features
  head_lr: 0.0002             # Increased slightly (0.0001 -> 0.0002) for better head recovery
  monitor_metric: "val_accuracy"
  monitor_mode: "max"
  early_stop_metric: "val_loss"
  early_stop_mode: "min"
  epochs: 100
  optimizer: "sam"            # Switched to SAM for better generalization
  base_optimizer: "adamw"     # Base for SAM
  sam_rho: 0.02               # Reduced from 0.05 to 0.02 for smoother search
  weight_decay: 0.02          # Reduced from 0.05 to 0.02 for better convergence
  label_smoothing: 0.1        # Handle noisy labels
  scheduler: "reduce_lr_on_plateau"
  lr_patience: 7
  lr_factor: 0.5
  use_class_weights: true

# ── WandB run identity ──
# Đặt tên run ở đây → tự động link lên WandB với tên này + timestamp
# Để trống (null) thì dùng tên mặc định: {model_name}_{timestamp}
logging:
  wandb_run_name: "cnn_dict_v2_SAM_Agument"   # <-- ĐỔI TÊN Ở ĐÂY
  
