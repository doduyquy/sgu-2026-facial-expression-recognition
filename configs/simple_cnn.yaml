model:
  dropout_block: 0.25 # dropout ratio for conv block after pooling
  dropout_dense: 0.5  # dropout ratio for fully connected layer (dense)

training: 
  loss: 'cross_entropy'
  optimizer: "adam"       # adam(*) | sgd 
  # optimier: 'sgd'
  # gamma: 0.9
  scheduler: "reduce_lr_on_plateau"  # none | step | cosine | reduce_lr_on_plateau (*)
  lr_factor: 0.5
  lr_patience: 3

  # scheduler: "step"
  # lr_step_size: 10
  # lr_gamma: 0.1

  # scheduler: "cosine"
  
