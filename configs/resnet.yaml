_base_: "base.yaml"

model:
  name: "resnet"
  pretrained: false
  use_learned_landmark_branch: true
  landmark_tau: 0.07
  landmark_tau: 0.02
  landmark_head_dropout_p: 0.2
  landmark_edge_guidance_beta: 1.0
  landmark_edge_alpha: 5.0
  landmark_use_cross_keypoint_competition: false
  landmark_edge_guidance_beta: 0.2
  landmark_edge_alpha: 6.0
  landmark_from_stage: 3

training:
  epochs: 200
  patience: 10
  loss: "cross_entropy"
  use_class_weights: False
  class_weight_mode: "sqrt_inverse"
  optimizer: "adam"
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: "reduce_lr_on_plateau"
  lr_factor: 0.5
  lr_patience: 3
  landmark_diversity_lambda: 0.15
  landmark_entropy_lambda: 0.02
  landmark_edge_align_lambda: 0.0
  landmark_edge_consistency_lambda: 0.01
  landmark_edge_conv_reg_lambda: 1e-5
  landmark_augment_consistency_lambda: 0.01
  landmark_aux_cls_lambda: 0.3