_base_: "base.yaml"

data:
  use_landmarks: false

model:
  name: "resnet"
  pretrained: false
  use_landmark_branch: true
  landmark_token_mode: "learnable"  # learnable | input | hybrid
  landmark_embed_dim: 128

training:
  epochs: 200
  patience: 10
  loss: "cross_entropy"
  use_class_weights: False
  class_weight_mode: "sqrt_inverse"
  optimizer: "adam"
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: "reduce_lr_on_plateau"
  lr_factor: 0.5
  lr_patience: 3
