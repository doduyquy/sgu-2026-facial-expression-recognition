_base_: "base.yaml"

model:
  name: "resnet"
  pretrained: false
  use_learned_landmark_branch: true
  landmark_num_points: 4
  landmark_tau: 0.06
  landmark_head_dropout_p: 0.2
  landmark_edge_guidance_beta: 0.0
  landmark_edge_alpha: 6.0
  landmark_edge_feat_guidance_beta: 0.0
  landmark_edge_dropout_prob: 0.0
  landmark_edge_head_scale_std: 0.08
  landmark_edge_mask_threshold: 0.3
  landmark_edge_gamma: 1.7
  landmark_tau_start: 0.2
  landmark_tau_end: 0.05
  landmark_center_prior_strength: 0.3
  landmark_center_prior_sigma: 0.28
  landmark_from_stage: 3

training:
  epochs: 200
  patience: 10
  loss: "cross_entropy"
  use_class_weights: False
  class_weight_mode: "sqrt_inverse"
  optimizer: "adam"
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: "reduce_lr_on_plateau"
  lr_factor: 0.5
  lr_patience: 3
  landmark_diversity_lambda: 0.2
  landmark_entropy_lambda: 0.03
  landmark_coord_spread_lambda: 0.1
  landmark_edge_align_lambda: 0.05
