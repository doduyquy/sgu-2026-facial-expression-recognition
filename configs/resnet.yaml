_base_: "base.yaml"

model:
  name: "resnet_dual"
  pretrained: false
  use_cbam_stage34: true
  cbam_reduction: 16
  cbam_kernel_size: 7
  landmark_edge_feat_guidance_beta: 0.2
  landmark_edge_dropout_prob: 0.15
  landmark_edge_head_scale_std: 0.08
  landmark_edge_mask_threshold: 0.3
  landmark_edge_gamma: 1.7
  landmark_from_stage: 3

  epochs: 200
  patience: 10
  loss: "cross_entropy"
  use_class_weights: False
  class_weight_mode: "sqrt_inverse"
  optimizer: "adam"
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: "reduce_lr_on_plateau"
  lr_factor: 0.5
  lr_patience: 3
  landmark_diversity_lambda: 0.2
  landmark_entropy_lambda: 0.03
  landmark_coord_spread_lambda: 0.1
  landmark_edge_align_lambda: 0.05


  use_sobel_channel: true
