_base_: "base.yaml"

model:
  name: "resnet"
  pretrained: false
  use_eca_stage34: true
  eca_kernel_size: 3
  use_arcface: true
  arcface_s: 30.0
  arcface_m: 0.35
  arcface_easy_margin: false

training:
  epochs: 200
  patience: 10
  loss: "cross_entropy"
  use_class_weights: False
  class_weight_mode: "sqrt_inverse"
  use_logit_adjustment: False
  logit_adjustment_tau: 0.2
  logit_adjustment_temperature: 1.0
  logit_adjustment_dynamic_tau: true
  logit_adjustment_dynamic_k: 0.6
  logit_adjustment_dynamic_tau_min: 0.1
  optimizer: "adam"
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: "reduce_lr_on_plateau"
  lr_factor: 0.5
  lr_patience: 3
