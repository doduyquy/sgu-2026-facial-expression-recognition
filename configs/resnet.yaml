_base_: "base.yaml"

model:
  name: "resnet"
  pretrained: false
  use_learned_landmark_branch: true
  landmark_num_points: 12
  landmark_tau: 0.07
  landmark_feature_dropout_p: 0.3
  landmark_head_dropout_p: 0.25
  landmark_logit_noise_std: 0.1
  landmark_from_stage: 3

training:
  epochs: 200
  patience: 10
  loss: "cross_entropy"
  use_class_weights: False
  class_weight_mode: "sqrt_inverse"
  optimizer: "adam"
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: "reduce_lr_on_plateau"
  lr_factor: 0.5
  lr_patience: 3
  landmark_diversity_lambda: 0.15
  landmark_entropy_lambda: 0.02
