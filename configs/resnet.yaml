_base_: "base.yaml"

model:
  name: "resnet"
  pretrained: false
  use_learned_landmark_branch: true
  landmark_num_points: 6
  landmark_tau: 0.02
  landmark_feature_dropout_p: 0.3
  landmark_mask_prob: 0.25
  landmark_prior_strength: 0.0
  landmark_prior_min_strength: 0.0
  landmark_prior_anneal_power: 1.5
  landmark_prior_disable_after_progress: 0.3
  landmark_prior_sigma: 0.20
  landmark_keypoint_dropout_p: 0.1
  landmark_part_mask_expand: 0.08
  landmark_part_target_inside: 0.35
  landmark_use_cross_keypoint_competition: false
  landmark_post_softmax_sharpness: 1.3
  landmark_use_soft_face_mask: false
  landmark_face_mask_strength: 0.0
  landmark_use_dynamic_patch_localization: true
  landmark_patch_window_sigma: 0.22
  landmark_patch_gate_strength: 0.7
  landmark_patch_center_detach_for_gate: false
  landmark_from_stage: 3

training:
  epochs: 200
  patience: 10
  loss: "cross_entropy"
  use_class_weights: False
  class_weight_mode: "sqrt_inverse"
  optimizer: "adam"
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: "reduce_lr_on_plateau"
  lr_factor: 0.5
  lr_patience: 3
  landmark_diversity_lambda: 0.3
  landmark_entropy_lambda: 0.1
  landmark_separation_lambda: 0.2
  landmark_part_prior_lambda: 0.0
  landmark_border_lambda: 0.0
  landmark_outside_face_lambda: 0.02
  landmark_patch_center_lambda: 0.1
