# Config mặc định CHUNG cho toàn bộ project
# Các file config yaml khác sẽ inherit thằng này
# Và ghi đè lại, chỉ ghi đè F1, không ghi đè F0!
# ----------- ----------- -----------

# Đối với config liên quan đến path, chỉ lưu name của chúng, 
# và mặc định đường dẫn sẽ dẫn đến theo cấu trúc project
# Ví dụ đối với data:
#     name: 'fer-2013'
# -> path trả về (ví dụ đang ở kaggle): 
#     '/kaggle/input/'

path:
  root: "/kaggle/working/sgu-2026-facial-expression-recognition/"

data:
  name: "fer13-split"
  num_classes: 7  # 1-angry, 2-disgust, 3-fear, 4-happy, 5-neutral, 6-sad, 7-surprise
  image_size: 48  # Q thấy dataset gốc:O 48x48
  batch_size: 64
  num_workers: 2  # num_workers is the number of subprocesses to use for data loading. 

seed: 
  random_seed: 42

model:
  name: "simple_cnn"       # Tên model (key trong registry)
  pretrained: False        # Sử dụng pretrain model hông?

training:
  epochs: 101
  patience: 10
  weight_decay: 0.0001
  optimizer: "adam"       # adam(*) | sgd 
  lr: 0.001
  scheduler: "reduce_lr_on_plateau"  # step | cosine | reduce_lr_on_plateau (*)


logging:
  # wandb
  use_wandb: true
  wandb_entity: "phucga15062005"
  wandb_project: "FER2013"
  # save_dir_name: "outputs"
  
env:
  platform: "kaggle"         # local | kaggle