# VGG + Emotion-Aware Adaptation (CNN Only)
# No Transformer version for stability and speed
_base_: "base.yaml"

model:
  name: "vgg_ea_cnn"
  dropout_block: 0.3
  # embed_dim fixed at 512 in model code

data:
  image_size: 48
  channels: 1 
  batch_size: 128     # CNN-only nhẹ hơn nên có thể tăng batch size
  mean: [0.5077]
  std: [0.2550]

training:
  use_class_weights: true
  lr: 0.001           # CNN có thể dùng LR cao hơn Transformer (1e-3)
  epochs: 100
  patience: 15
  label_smoothing: 0.1
  loss: "cross_entropy"
  optimizer: "adamw"
