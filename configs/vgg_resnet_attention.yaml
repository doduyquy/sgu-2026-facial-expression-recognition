
# Hybrid VGG-ResNet Attention Fusion + Transfer Learning
_base_: "base.yaml"

model:
  name: "vgg_resnet_attention"
  embed_dim: 512
  num_heads: 4 
  transformer_dropout: 0.2

  # VGG Backbone (giữ nguyên Spatial Attention như lúc train 69%)
  use_aux: false
  use_attention: true

  # ResNet Backbone (giữ nguyên CBAM như lúc train 68%)
  attention_type: "cbam"
  attention_kernel_size: 7
  use_fusion: true

  # ── Transfer Learning ──
  # Đường dẫn tới checkpoint tốt nhất của VGG (69.2%) và ResNet (68.5%)
  # Trên Kaggle: upload 2 file .pth lên Dataset rồi trỏ đường dẫn ở đây
  pretrained_vgg_path: "/kaggle/input/datasets/lhngphc/vgg-0-912/vgg_spatial_10042026_1053_best.pth"
  pretrained_resnet_path: "/kaggle/input/datasets/lhngphc/resnet-0-68/resnet50_12042026_1052_best.pth"
  
  # Số epoch đóng băng backbone (Phase 1: chỉ train Fusion Head)
  # Sau freeze_backbone_epochs epoch, mở băng toàn bộ để fine-tune (Phase 2)
  freeze_backbone_epochs: 20

data:
  image_size: 48
  channels: 1
  batch_size: 32

training:
  lr: 0.0005         # Phase 1: LR cao - chỉ train Fusion Head
  finetune_lr: 0.00001  # Phase 2: LR cực nhỏ - fine-tune toàn bộ
  epochs: 100
  optimizer: "adam"
  weight_decay: 0.001       # Tăng từ 0.0001 để giảm Overfit
  label_smoothing: 0.1      # Giảm độ tự tin thái quá của model
  use_class_weights: true

env:
  platform: "kaggle"

kaggle:
  data_path: "/kaggle/input/datasets/doduyquynii/fer13-split/fer13-split"
  root_path: "/kaggle/working/sgu-2026-facial-expression-recognition"
